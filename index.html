<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button type="button">Get Space Images</button>
    </div>

    <section id="factSection" class="fact-section" aria-live="polite">
      <h2>Did You Know?</h2>
      <p id="spaceFact">Loading a fun space fact...</p>
    </section>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <button class="modal-close" type="button" aria-label="Close">×</button>
      <div id="modalMedia" class="modal-media">
        <img id="modalImage" class="modal-image" src="" alt="" />
        <div id="modalVideoMessage" class="modal-video-message hidden">
          <div class="placeholder-icon">▶️</div>
          <p>This APOD entry is a video. Open it directly to watch.</p>
          <a id="modalVideoLink" class="modal-video-link" href="#" target="_blank" rel="noopener noreferrer">Open video</a>
        </div>
      </div>
      <h2 id="modalTitle"></h2>
      <p id="modalDate" class="modal-date"></p>
      <p id="modalExplanation" class="modal-explanation"></p>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
